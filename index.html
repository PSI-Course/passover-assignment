<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אחד באפריל וחג שמח!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap');

    body {
      margin: 0;
      font-family: 'Baloo 2', cursive;
      background: linear-gradient(135deg, #fdd835, #ff7043);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
    }

    .container {
      background: rgba(0,0,0,0.4);
      padding: 50px;
      border-radius: 25px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 90%;
      animation: popIn 1s ease-out;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }

    button {
      background: #ffeb3b;
      border: none;
      color: #333;
      padding: 15px 25px;
      font-size: 1em;
      border-radius: 15px;
      margin: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    img {
      max-width: 100%;
      border-radius: 15px;
      margin-top: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 אחד באפריל וחג שמח! 🎉</h1>
    <p>תודה שבאתם לבקר באתר שלנו, תהנו מהכפתורים וההפתעות!</p>

    <button onclick="alert('חג שמח! 🥳')">לחץ כאן לחג שמח</button>
    <button onclick="document.body.style.background = '#4caf50'">שנה צבע רקע</button>

    <img src="https://placekitten.com/400/250" alt="חג שמח תמונה חמודה">
  </div>
</body>
</html>
